name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Rebuild sqlite3 for Electron (arm64)
        run: npx electron-rebuild -f -w sqlite3 -m backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build macOS DMG
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/*.dmg
          retention-days: 30

  build-win:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Rebuild sqlite3 for Electron (x64)
        run: npx electron-rebuild -f -w sqlite3 -m backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Windows EXE
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 30

  release:
    name: Create Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: release-files

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          name: Student Management ${{ github.ref_name }}
          body: |
            ## Student Management ${{ github.ref_name }}

            ### Downloads
            - **macOS (Apple Silicon)** - Download the .dmg file, open it, drag the app to Applications
            - **Windows** - Download the .exe file and run the installer
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}